<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JACKPOT SIM</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #e8c84a;
    --accent2: #f0a500;
    --glow: #e8c44a55;
    --text: #e0ddf0;
    --muted: #5a5870;
    --common: #8a9bb5;
    --uncommon: #4caf7d;
    --rare: #5b8ef0;
    --epic: #a855f7;
    --mythic: #ef4444;
    --legendary: #f97316;
    --jackpot: #e8c84a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, #e8c44a18 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, #ffffff03 60px, #ffffff03 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, #ffffff03 60px, #ffffff03 61px);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: #0d0d14cc;
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 20px var(--glow);
  }
  .logo span { color: var(--text); opacity: 0.5; font-weight: 400; font-size: 0.8em; }

  .balance-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 18px;
  }
  .balance-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .balance-amount {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .balance-h { font-size: 0.8em; opacity: 0.7; }

  /* ─── MAIN ─── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ─── REEL ─── */
  .reel-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  .reel-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .reel-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .roll-cost {
    font-size: 0.8rem;
    color: var(--muted);
  }
  .roll-cost strong { color: var(--accent); font-family: 'Orbitron', monospace; }

  .reel-window {
    position: relative;
    height: 130px;
    overflow: hidden;
    background: #08080f;
  }

  /* center highlight */
  .reel-window::before {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0; bottom: 0;
    width: 120px;
    border-left: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
    z-index: 10;
    pointer-events: none;
    box-shadow: inset 0 0 30px #e8c44a22, 0 0 20px #e8c44a33;
  }
  /* fade edges */
  .reel-window::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #08080f 0%, transparent 18%, transparent 82%, #08080f 100%);
    z-index: 9;
    pointer-events: none;
  }

  .reel-track {
    display: flex;
    align-items: center;
    height: 100%;
    gap: 6px;
    padding: 0 6px;
    will-change: transform;
  }

  .reel-item {
    flex-shrink: 0;
    width: 108px;
    height: 108px;
    border-radius: 8px;
    border: 2px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: border-color 0.2s;
    background: #111118;
    position: relative;
    overflow: hidden;
  }

  .reel-item::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
  }

  .reel-item .item-icon { font-size: 2.2rem; line-height: 1; }
  .reel-item .item-name {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    padding: 0 4px;
    color: #aaa;
  }
  .reel-item .item-value {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 700;
  }

  /* rarity borders */
  .r-common    { border-color: #8a9bb555; }
  .r-common .item-value    { color: var(--common); }
  .r-uncommon  { border-color: #4caf7d55; }
  .r-uncommon .item-value  { color: var(--uncommon); }
  .r-rare      { border-color: #5b8ef055; }
  .r-rare .item-value      { color: var(--rare); }
  .r-epic      { border-color: #a855f755; }
  .r-epic .item-value      { color: var(--epic); }
  .r-mythic    { border-color: #ef444455; }
  .r-mythic .item-value    { color: var(--mythic); }
  .r-legendary { border-color: #f9731655; }
  .r-legendary .item-value { color: var(--legendary); }
  .r-jackpot   { border-color: #e8c84a88; }
  .r-jackpot .item-value   { color: var(--jackpot); }
  .r-jackpot .item-icon    { filter: drop-shadow(0 0 10px #e8c84a); }

  /* ─── CONTROLS ─── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 12px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-roll {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #0a0a0f;
    font-size: 0.9rem;
    padding: 14px 44px;
    box-shadow: 0 0 30px #e8c44a44;
  }
  .btn-roll:hover:not(:disabled) { box-shadow: 0 0 45px #e8c44a88; }

  .btn-sell-all {
    background: transparent;
    color: var(--uncommon);
    border: 1px solid var(--uncommon);
  }
  .btn-sell-all:hover:not(:disabled) { background: #4caf7d18; }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }

  /* ─── RESULT POP ─── */
  .result-pop {
    text-align: center;
    padding: 8px 0 0;
    min-height: 36px;
  }
  .result-pop .rp-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .result-pop .rp-rarity {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ─── MULTI-ROLL COUNT ─── */
  .roll-count-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    padding: 0 24px 4px;
  }
  .roll-count-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }
  .roll-count-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .roll-count-btn:hover { border-color: var(--accent); color: var(--accent); }
  .roll-count-btn.active {
    background: #e8c44a22;
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── BOTTOM GRID ─── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
  }
  @media (max-width: 740px) {
    .bottom-grid { grid-template-columns: 1fr; }
  }

  /* ─── INVENTORY ─── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .panel-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .inv-count {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .inv-count strong { color: var(--text); }

  .inv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    padding: 16px;
    max-height: 360px;
    overflow-y: auto;
  }
  .inv-grid::-webkit-scrollbar { width: 4px; }
  .inv-grid::-webkit-scrollbar-track { background: transparent; }
  .inv-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .inv-card {
    background: #0d0d16;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 6px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .inv-card:hover { border-color: #ffffff33; transform: translateY(-2px); }
  .inv-card:hover .sell-hint { opacity: 1; }

  .sell-hint {
    position: absolute;
    inset: 0;
    background: #00000088;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--uncommon);
    opacity: 0;
    transition: opacity 0.15s;
    text-transform: uppercase;
  }

  .inv-icon { font-size: 1.6rem; line-height: 1; }
  .inv-name {
    font-size: 0.56rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #888;
    text-align: center;
  }
  .inv-val {
    font-family: 'Orbitron', monospace;
    font-size: 0.58rem;
    font-weight: 700;
  }
  .inv-qty {
    position: absolute;
    top: 4px;
    right: 5px;
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--text);
    background: #ffffff18;
    border-radius: 3px;
    padding: 0 4px;
  }

  .inv-empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
  }

  /* ─── ODDS / SIDEBAR ─── */
  .odds-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
  .odds-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    border-radius: 5px;
    background: #0d0d16;
    border: 1px solid var(--border);
  }
  .odds-left { display: flex; align-items: center; gap: 8px; }
  .odds-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .odds-rarity {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .odds-right { display: flex; align-items: center; gap: 12px; }
  .odds-pct { font-family: 'Orbitron', monospace; font-size: 0.68rem; color: var(--muted); }
  .odds-sell {
    font-family: 'Orbitron', monospace;
    font-size: 0.68rem;
    font-weight: 700;
  }

  /* ─── STATS ─── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-label {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-value.neg { color: var(--mythic); }
  .stat-value.pos { color: var(--uncommon); }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a26;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── JACKPOT FLASH ─── */
  @keyframes jackpotFlash {
    0%,100% { background: var(--bg); }
    20% { background: #e8c44a18; }
    40% { background: var(--bg); }
    60% { background: #e8c44a12; }
  }
  .jackpot-flash { animation: jackpotFlash 0.8s ease; }

  /* ─── SPINNING ─── */
  .spinning .reel-track { transition: transform 0s; }
</style>
</head>
<body>

<!-- ════════════════════════════════ ITEM DATABASE ════════════════════════════════
  EASY EDIT ZONE — add, remove, or modify items freely.
  Each item: { name, icon, rarity, weight }
  Rarity options: common | uncommon | rare | epic | mythic | legendary | jackpot
  Weight = relative probability. Higher = more frequent.
  Sell values are defined in RARITY_VALUES below.
════════════════════════════════════════════════════════════════════════════════ -->

<header>
  <div class="logo">JACKPOT<span>SIM</span></div>
  <div class="balance-box">
    <span class="balance-label">Balance</span>
    <span class="balance-amount" id="balanceDisplay">250<span class="balance-h"> H</span></span>
  </div>
</header>

<main>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">Rolls</div>
      <div class="stat-value" id="statRolls">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Spent</div>
      <div class="stat-value neg" id="statSpent">0 H</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Earned</div>
      <div class="stat-value pos" id="statEarned">0 H</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Best Drop</div>
      <div class="stat-value" id="statBest">—</div>
    </div>
  </div>

  <!-- REEL -->
  <div class="reel-section">
    <div class="reel-header">
      <span class="reel-title">⬡ Roll &amp; Drop</span>
      <span class="roll-cost">Cost: <strong>6 H</strong> per roll</span>
    </div>

    <div class="roll-count-bar">
      <span class="roll-count-label">Rolls:</span>
      <button class="roll-count-btn active" data-n="1">×1</button>
      <button class="roll-count-btn" data-n="3">×3</button>
      <button class="roll-count-btn" data-n="5">×5</button>
      <button class="roll-count-btn" data-n="10">×10</button>
    </div>

    <div class="reel-window">
      <div class="reel-track" id="reelTrack"></div>
    </div>

    <div class="result-pop" id="resultPop"></div>

    <div class="controls">
      <button class="btn btn-secondary" id="btnSellAll" disabled>Sell All</button>
      <button class="btn btn-roll" id="btnRoll">ROLL — 6 H</button>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-grid">
    <!-- INVENTORY -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">📦 Inventory</span>
        <span class="inv-count">Items: <strong id="invCount">0</strong></span>
      </div>
      <div class="inv-grid" id="invGrid">
        <div class="inv-empty">No items yet. Start rolling!</div>
      </div>
    </div>

    <!-- ODDS -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">📊 Drop Rates & Values</span>
      </div>
      <div class="odds-list" id="oddsList"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>

  { name: "Sol Meteor",      icon: "☄️", rarity: "legendary", weight: 4  },
  { name: "Eternal Bloom",   icon: "🌸", rarity: "legendary", weight: 3.5},
  { name: "Aether Sword",    icon: "⚔️", rarity: "legendary", weight: 2  },

  // ── Jackpot ─────────────────────────────────────────
  { name: "JACKPOT",         icon: "🃏", rarity: "jackpot",   weight: 0.5},
  { name: "JACKPOT",         icon: "💰", rarity: "jackpot",   weight: 0.7},
];

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let balance  = 250;
let inventory = [];          // [{...item, id}]
let stats = { rolls: 0, spent: 0, earned: 0, bestDrop: null };
let rolling = false;
let multiCount = 1;

const ITEM_W = 114;          // card width + gap
const REEL_VISIBLE = 7;      // cards visible in window
const SPIN_ITEMS = 60;       // items in a full spin array

// ════════════════════════════════════════════════════════════
//  WEIGHTED RANDOM
// ════════════════════════════════════════════════════════════
const totalWeight = ITEMS.reduce((s, i) => s + i.weight, 0);

function weightedRandom() {
  let r = Math.random() * totalWeight;
  for (const item of ITEMS) {
    r -= item.weight;
    if (r <= 0) return item;
  }
  return ITEMS[ITEMS.length - 1];
}

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════
function rarityColor(r) {
  const map = {
    common:'#8a9bb5', uncommon:'#4caf7d', rare:'#5b8ef0',
    epic:'#a855f7', mythic:'#ef4444', legendary:'#f97316', jackpot:'#e8c84a'
  };
  return map[r] || '#fff';
}

function makeCard(item) {
  const div = document.createElement('div');
  div.className = `reel-item r-${item.rarity}`;
  div.style.background = rarityColor(item.rarity) + '12';
  div.innerHTML = `
    <span class="item-icon">${item.icon}</span>
    <span class="item-name">${item.name}</span>
    <span class="item-value">${RARITY_VALUES[item.rarity]} H</span>
  `;
  return div;
}

function updateBalance() {
  document.getElementById('balanceDisplay').innerHTML =
    `${balance}<span class="balance-h"> H</span>`;
}

function updateStats() {
  document.getElementById('statRolls').textContent  = stats.rolls;
  document.getElementById('statSpent').textContent  = stats.spent + ' H';
  document.getElementById('statEarned').textContent = stats.earned + ' H';
  document.getElementById('statBest').textContent   =
    stats.bestDrop ? `${stats.bestDrop.icon} ${RARITY_VALUES[stats.bestDrop.rarity]} H` : '—';
}

function updateInventory() {
  const grid = document.getElementById('invGrid');
  document.getElementById('invCount').textContent = inventory.length;

  if (!inventory.length) {
    grid.innerHTML = '<div class="inv-empty">No items yet. Start rolling!</div>';
    document.getElementById('btnSellAll').disabled = true;
    return;
  }
  document.getElementById('btnSellAll').disabled = false;

  // group by name+rarity
  const groups = {};
  for (const it of inventory) {
    const key = it.name + it.rarity;
    if (!groups[key]) groups[key] = { ...it, qty: 0 };
    groups[key].qty++;
  }

  grid.innerHTML = '';
  for (const g of Object.values(groups)) {
    const card = document.createElement('div');
    card.className = 'inv-card';
    card.innerHTML = `
      <div class="sell-hint">SELL</div>
      ${g.qty > 1 ? `<span class="inv-qty">×${g.qty}</span>` : ''}
      <span class="inv-icon">${g.icon}</span>
      <span class="inv-name">${g.name}</span>
      <span class="inv-val r-${g.rarity}" style="color:${rarityColor(g.rarity)}">${RARITY_VALUES[g.rarity]} H</span>
    `;
    card.addEventListener('click', () => sellOne(g.name, g.rarity));
    grid.appendChild(card);
  }
}

function buildOdds() {
  const list = document.getElementById('oddsList');
  const rarities = ['common','uncommon','rare','epic','mythic','legendary','jackpot'];
  for (const r of rarities) {
    const w = ITEMS.filter(i => i.rarity === r).reduce((s, i) => s + i.weight, 0);
    const pct = ((w / totalWeight) * 100).toFixed(2);
    const row = document.createElement('div');
    row.className = 'odds-row';
    row.innerHTML = `
      <div class="odds-left">
        <span class="odds-dot" style="background:${rarityColor(r)}"></span>
        <span class="odds-rarity" style="color:${rarityColor(r)}">${r}</span>
      </div>
      <div class="odds-right">
        <span class="odds-pct">${pct}%</span>
        <span class="odds-sell" style="color:${rarityColor(r)}">${RARITY_VALUES[r]} H</span>
      </div>
    `;
    list.appendChild(row);
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ════════════════════════════════════════════════════════════
//  SELL
// ════════════════════════════════════════════════════════════
function sellOne(name, rarity) {
  const idx = inventory.findIndex(i => i.name === name && i.rarity === rarity);
  if (idx === -1) return;
  const val = RARITY_VALUES[rarity];
  inventory.splice(idx, 1);
  balance += val;
  stats.earned += val;
  updateBalance();
  updateInventory();
  updateStats();
  showToast(`Sold ${name} for ${val} H`);
}

function sellAll() {
  if (!inventory.length) return;
  let total = 0;
  for (const it of inventory) total += RARITY_VALUES[it.rarity];
  inventory = [];
  balance += total;
  stats.earned += total;
  updateBalance();
  updateInventory();
  updateStats();
  showToast(`Sold all items for ${total} H`);
}

// ════════════════════════════════════════════════════════════
//  REEL SPIN
// ════════════════════════════════════════════════════════════
function buildSpinArray(winner) {
  // fill with random items, place winner near end
  const arr = [];
  for (let i = 0; i < SPIN_ITEMS - 1; i++) arr.push(weightedRandom());
  arr.push(winner);
  return arr;
}

function spinReel(winner) {
  return new Promise(resolve => {
    const track = document.getElementById('reelTrack');
    track.innerHTML = '';
    track.style.transition = 'none';
    track.style.transform = 'translateX(0)';

    const spinArr = buildSpinArray(winner);
    spinArr.forEach(item => track.appendChild(makeCard(item)));

    // Force reflow
    track.getBoundingClientRect();

    // Winner is at index SPIN_ITEMS-1
    // We want winner centered in the window
    const windowCenter = track.parentElement.offsetWidth / 2;
    const winnerCenter = (SPIN_ITEMS - 1) * ITEM_W + ITEM_W / 2;
    const offset = winnerCenter - windowCenter;

    // Ease + slight overshoot
    const duration = 3200 + Math.random() * 400;
    track.style.transition = `transform ${duration}ms cubic-bezier(0.08, 0.82, 0.17, 1)`;
    track.style.transform = `translateX(-${offset}px)`;

    setTimeout(resolve, duration + 80);
  });
}

// ════════════════════════════════════════════════════════════
//  ROLL LOGIC
// ════════════════════════════════════════════════════════════
async function doRoll(n) {
  if (rolling) return;
  const cost = ROLL_COST * n;
  if (balance < cost) {
    showToast(`Not enough H! Need ${cost} H`);
    return;
  }

  rolling = true;
  balance -= cost;
  stats.spent += cost;
  stats.rolls += n;
  updateBalance();
  updateStats();

  document.getElementById('btnRoll').disabled = true;
  document.getElementById('btnSellAll').disabled = true;
  document.getElementById('resultPop').innerHTML = '';

  // For multi-rolls, spin all but last fast, last one full animation
  const results = [];
  for (let i = 0; i < n; i++) results.push(weightedRandom());

  if (n === 1) {
    await spinReel(results[0]);
  } else {
    // show quick flashes for first n-1
    for (let i = 0; i < n - 1; i++) {
      const track = document.getElementById('reelTrack');
      track.innerHTML = '';
      track.style.transition = 'none';
      track.style.transform = 'translateX(0)';
      const arr = buildSpinArray(results[i]);
      arr.forEach(item => track.appendChild(makeCard(item)));
      await new Promise(r => setTimeout(r, 120));
    }
    await spinReel(results[n - 1]);
  }

  // Process all results
  for (const winner of results) {
    inventory.push({ ...winner, id: Date.now() + Math.random() });
    if (!stats.bestDrop || RARITY_VALUES[winner.rarity] > RARITY_VALUES[stats.bestDrop.rarity]) {
      stats.bestDrop = winner;
    }
    if (winner.rarity === 'jackpot') {
      document.body.classList.remove('jackpot-flash');
      void document.body.offsetWidth;
      document.body.classList.add('jackpot-flash');
    }
  }

  // Show last winner in result pop
  const last = results[results.length - 1];
  const pop = document.getElementById('resultPop');
  pop.innerHTML = `
    <div class="rp-name" style="color:${rarityColor(last.rarity)}">${last.icon} ${last.name}</div>
    <div class="rp-rarity" style="color:${rarityColor(last.rarity)}">${last.rarity} · ${RARITY_VALUES[last.rarity]} H value</div>
  `;
  if (n > 1) {
    pop.innerHTML += `<div style="font-size:0.72rem;color:var(--muted);margin-top:2px;">(+${n} items added)</div>`;
  }

  updateInventory();
  updateStats();

  rolling = false;
  document.getElementById('btnRoll').disabled = false;
}

// ════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════════════
document.getElementById('btnRoll').addEventListener('click', () => doRoll(multiCount));
document.getElementById('btnSellAll').addEventListener('click', sellAll);

document.querySelectorAll('.roll-count-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.roll-count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    multiCount = parseInt(btn.dataset.n);
    const cost = ROLL_COST * multiCount;
    document.getElementById('btnRoll').textContent = `ROLL — ${cost} H`;
  });
});

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
updateBalance();
updateStats();
updateInventory();
buildOdds();
// Pre-fill reel with random items
(function initReel() {
  const track = document.getElementById('reelTrack');
  for (let i = 0; i < REEL_VISIBLE + 4; i++) {
    track.appendChild(makeCard(weightedRandom()));
  }
})();
</script>
</body>
</html>
